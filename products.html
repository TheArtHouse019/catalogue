  data-template="vertical-menu-template-free">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

  <title id="page_title">Products Collection</title>

  <meta name="description" content="" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="assets/img/favicon/favicon.ico" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- Icons -->
  <link rel="stylesheet" href="assets/vendor/fonts/boxicons.css" />

  <!-- Core CSS -->
  <link rel="stylesheet" href="assets/vendor/css/core.css" class="template-customizer-core-css" />
  <link rel="stylesheet" href="assets/vendor/css/theme-default.css" class="template-customizer-theme-css" />
  <link rel="stylesheet" href="assets/css/demo.css" />
  <link rel="stylesheet" href="assets/css/custome.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

  <!-- Vendors CSS -->
  <link rel="stylesheet" href="assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css" />

  <!-- Helpers -->
  <script src="assets/vendor/js/helpers.js"></script>
  <script src="assets/js/config.js"></script>

  <style>
    :root {
      --deep-burgundy: #5c061a;
      --dusty-rose: #d67a8a;
      --warm-cream: #faf6ef;
      --rich-brown: #3a2e2b;
      --soft-gold: #c9a054;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--warm-cream);
      color: var(--rich-brown);
    }

    h1, h2, h3, .navbar-brand, .card-title {
      font-family: 'Playfair Display', serif;
      color: var(--deep-burgundy) !important;
    }

    h2 {
      text-align: center;
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 40px;
      position: relative;
    }

    h2::after {
      content: '❖';
      display: block;
      font-size: 16px;
      color: var(--dusty-rose);
      margin-top: 8px;
      font-weight: normal;
    }

    /* NAVIGATION */
    .navbar {
      background-color: #ffffff !important;
      box-shadow: 0 4px 20px rgba(58, 46, 43, 0.04);
      padding: 15px 0;
    }

    #header_id_name {
      font-size: 26px !important;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .navbar-nav .nav-item .nav-link {
      color: var(--rich-brown) !important;
      font-size: 16px !important;
      font-weight: 500;
      padding: 8px 20px !important;
      transition: color 0.3s ease;
    }

    .navbar-nav .nav-item .nav-link:hover {
      color: var(--dusty-rose) !important;
    }

    #header_loader_image {
      max-width: 50px;
      max-height: 50px;
      object-fit: cover;
      border-radius: 50%;
      margin-right: 10px;
    }

    section {
      max-width: 1200px;
      margin: auto;
      padding: 60px 20px;
    }

    /* PRODUCT GRID CARDS */
    .product-grid-card {
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(214, 122, 138, 0.12);
      box-shadow: 0 8px 25px rgba(58, 46, 43, 0.04);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .card-img-wrapper {
      overflow: hidden;
      line-height: 0;
      position: relative;
    }

    .product-grid-card img {
      width: 100%;
      height: 270px;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.4s ease;
    }

    .product-grid-card:hover img {
      transform: scale(1.03);
    }

    .grid-card-footer {
      padding: 20px;
      text-align: center;
      background: #ffffff;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .grid-card-title {
      font-family: 'Playfair Display', serif;
      color: var(--deep-burgundy);
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .grid-card-code {
      font-size: 12px;
      color: var(--dusty-rose);
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .btn-shop-now {
      background-color: var(--deep-burgundy) !important;
      border-color: var(--deep-burgundy) !important;
      color: #ffffff !important;
      padding: 10px 25px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: all 0.3s ease !important;
      box-shadow: 0 4px 12px rgba(92, 6, 26, 0.15);
      display: inline-block;
      text-align: center;
      text-decoration: none;
    }

    .btn-shop-now:hover {
      background-color: var(--dusty-rose) !important;
      border-color: var(--dusty-rose) !important;
      color: #ffffff !important;
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(214, 122, 138, 0.25);
    }

    .btn-load-more {
      background-color: transparent;
      border: 2px solid var(--deep-burgundy);
      color: var(--deep-burgundy);
      padding: 12px 35px;
      border-radius: 30px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-load-more:hover {
      background-color: var(--deep-burgundy);
      color: #ffffff;
    }

    /* LIGHTBOX SYSTEM LAYOUT */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(58, 46, 43, 0.95);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #lightbox .lightbox-content {
      max-width: calc(100vw - 80px);
      max-height: calc(100vh - 80px);
      position: relative;
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #lightbox .lightbox-content img {
      display: block;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    #lightbox .lightbox-close {
      position: absolute;
      top: -45px;
      right: 0;
      font-size: 35px;
      color: #fff;
      background: transparent;
      border: none;
      cursor: pointer;
    }

    #lightbox .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: var(--deep-burgundy);
      color: #fff;
      border: none;
      font-size: 28px;
      padding: 5px 20px;
      border-radius: 30px;
      cursor: pointer;
      z-index: 10;
      transition: background 0.3s ease;
    }

    #lightbox .lightbox-nav:hover {
      background: var(--dusty-rose);
    }

    #lightbox .lightbox-nav.prev { left: -60px; }
    #lightbox .lightbox-nav.next { right: -60px; }

    @media (max-width: 768px) {
      #lightbox .lightbox-nav.prev { left: 10px; }
      #lightbox .lightbox-nav.next { right: 10px; }
      #lightbox .lightbox-content img { max-height: 60vh; }
    }

    footer {
      background: var(--rich-brown);
      color: var(--warm-cream);
      text-align: center;
      padding: 40px 20px;
      margin-top: 60px;
    }
  </style>
</head>

<body>

  <!-- Navigation Navbar -->
  <nav class="navbar navbar-expand-lg bg-white">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <img id="header_loader_image" src="assets/img/logo.png" alt="Logo">
        <span id="header_id_name"></span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Products Portfolio Grid -->
  <section>
    <h2 id="products_heading">Our Collection</h2>
    
    <!-- Dynamic Products Card Matrix Box -->
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="products_grid_container">
      <!-- Loaded dynamically via runtime script -->
    </div>

    <!-- Pagination Trigger -->
    <div class="text-center mt-5 d-none" id="load_more_wrapper">
      <button id="btn_load_more" class="btn btn-load-more">Load More Products</button>
    </div>
  </section>

  <!-- Lightbox System Layout -->
  <div id="lightbox" aria-hidden="true">
    <div class="lightbox-content">
      <button id="closeLightbox" class="lightbox-close" aria-label="Close" onclick="window.closeLightboxModal()">&times;</button>
      <button id="lightboxPrev" class="lightbox-nav prev" aria-label="Previous" onClick="changeLightboxImage(-1)">‹</button>
      <img id="lightboxImg" src="" alt="Preview content" />
      <button id="lightboxNext" class="lightbox-nav next" aria-label="Next" onClick="changeLightboxImage(1)">›</button>
    </div>
  </div>

  <footer>
    <p>© 2026 Handmade with Heart. All Rights Reserved.</p>
  </footer>

  <!-- Vendor Scripts -->
  <script src="assets/vendor/libs/jquery/jquery.js"></script>
  <script src="assets/vendor/js/bootstrap.js"></script>
  <script src="project_data.js"></script>

  <!-- Core Runtime Implementation Engine Layer -->
  <script>
    $('#page_title').text(project_title);
    $('#header_id_name').text(project_title);

    // Lightbox Global State Registry
    var currentGalleryImages = [];
    var currentGalleryIndex = 0;

    window.openLightbox = function (id) {
      if (!id) return;
      currentGalleryImages = [];

      // Extract values matching current item attributes
      var bannerSrc = $('.banner-' + id).attr('src');
      if (bannerSrc) currentGalleryImages.push(bannerSrc);

      $('.img-' + id).each(function (index, item) {
        var thumbSrc = $(item).attr('data-src');
        if (thumbSrc) currentGalleryImages.push(thumbSrc);
      });

      if (currentGalleryImages.length === 0) return;
      currentGalleryIndex = 0;

      var lightbox = document.getElementById('lightbox');
      var lightboxImg = document.getElementById('lightboxImg');

      if (lightbox && lightboxImg) {
        lightboxImg.src = currentGalleryImages[currentGalleryIndex];
        lightbox.style.display = 'flex';
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      }
    };

    window.changeLightboxImage = function (direction) {
      var lightboxImg = document.getElementById('lightboxImg');
      if (!lightboxImg || currentGalleryImages.length === 0) return;

      currentGalleryIndex += direction;
      if (currentGalleryIndex >= currentGalleryImages.length) {
        currentGalleryIndex = 0;
      } else if (currentGalleryIndex < 0) {
        currentGalleryIndex = currentGalleryImages.length - 1;
      }
      lightboxImg.src = currentGalleryImages[currentGalleryIndex];
    };

    window.closeLightboxModal = function () {
      var lightbox = document.getElementById('lightbox');
      if (lightbox) {
        lightbox.style.display = 'none';
        lightbox.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = 'auto';
      }
    };

    window.redirectToProductDetails = function (productId, event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      if (!productId) return;
      window.location.href = "product_details.html?id=" + encodeURIComponent(productId);
    };

    // Pagination Configuration Matrices Engine
    $(document).ready(function () {
      const LOCAL_PRODUCTS_SOURCE = "data/products.json";
      
      // Parse query string configurations
      const urlParams = new URLSearchParams(window.location.search);
      const categoryIdParam = urlParams.get('category_id');

      let filteredProducts = [];
      let renderedCount = 0;
      const stepLimit = 20;

      $.ajax({
        url: LOCAL_PRODUCTS_SOURCE,
        type: "GET",
        dataType: "json",
        success: function (response) {
          if (!response || !response.data) return;

          // Filter out active configurations matching criteria
          let rawProducts = response.data.filter(p => p.status === "Active");

          if (categoryIdParam) {
            // Context rule 1: Category preset, load first 20 products
            filteredProducts = rawProducts.filter(p => p.category_id === categoryIdParam);
            $("#products_heading").text("Filtered Collection Layout");
          } else {
            // Context rule 2: No category parameter preset, reverse sorting load last 20 products first
            filteredProducts = rawProducts.reverse();
          }

          renderNextBatch();

          // Bind event listeners to structural components
          if (filteredProducts.length > renderedCount) {
            $("#load_more_wrapper").removeClass("d-none");
          }

          $("#btn_load_more").on("click", function () {
            renderNextBatch();
          });
        },
        error: function (xhr, status, error) {
          console.error("Failed to parse registry file collections matrix.", error);
          $("#products_grid_container").html('<p class="text-center w-100">Error rendering catalog assets pipeline execution modules.</p>');
        }
      });

      function renderNextBatch() {
        let gridContainer = $("#products_grid_container");
        let targetRangeLimit = Math.min(renderedCount + stepLimit, filteredProducts.length);

        for (let i = renderedCount; i < targetRangeLimit; i++) {
          let item = filteredProducts[i];
          
          let cardHtml = `
            <div class="col">
              <div class="product-grid-card">
                <div class="card-img-wrapper">
                  <img src="${item.banner_image}" class="banner-${item.id}" alt="${item.name}" onclick="openLightbox('${item.id}')" />`;
                  
          if (item.image1) cardHtml += `<span class="d-none img-${item.id}" data-src="${item.image1}"></span>`;
          if (item.image2) cardHtml += `<span class="d-none img-${item.id}" data-src="${item.image2}"></span>`;
          if (item.image3) cardHtml += `<span class="d-none img-${item.id}" data-src="${item.image3}"></span>`;
          if (item.image4) cardHtml += `<span class="d-none img-${item.id}" data-src="${item.image4}"></span>`;
          if (item.image5) cardHtml += `<span class="d-none img-${item.id}" data-src="${item.image5}"></span>`;

          cardHtml += `
                </div>
                <div class="grid-card-footer">
                  <div>
                    <h5 class="grid-card-title">${item.name}</h5>
                    <div class="grid-card-code">Code: ${item.product_code}</div>
                  </div>
                  <button class="btn btn-shop-now btn-sm w-100 mt-2" onclick="redirectToProductDetails('${item.id}', event)">Shop Now</button>
                </div>
              </div>
            </div>`;

          gridContainer.append(cardHtml);
        }

        renderedCount = targetRangeLimit;

        // Hide structural interaction trigger if target boundaries are reached
        if (renderedCount >= filteredProducts.length) {
          $("#load_more_wrapper").addClass("d-none");
        }
      }
    });

    // Integrated Keyboard Accessibility Array Modulators
    document.addEventListener('keydown', function(event) {
      var lightbox = document.getElementById('lightbox');
      if (lightbox && lightbox.style.display === 'flex') {
        if (event.key === 'ArrowRight') window.changeLightboxImage(1);
        if (event.key === 'ArrowLeft') window.changeLightboxImage(-1);
        if (event.key === 'Escape') window.closeLightboxModal();
      }
    });
  </script>
</body>

</html>

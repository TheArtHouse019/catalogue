  <!-- Core Runtime Controller Logic -->
  <script>
    var project_thumb = 'assets/img/project_thumb/';

    $('#page_title').text(project_title);
    $('#header_id_name').text(project_title);


    // 🚀 Fixed & Globally Scoped Lightbox System
    window.currentImages = [];
    window.currentIndex = 0;

    // 1. Declare global variables to track the current gallery state
    var currentGalleryImages = [];
    var currentGalleryIndex = 0;

    window.openLightbox = function (id) {
      if (!id) return;

      // Reset and build the images array dynamically from your DOM elements
      currentGalleryImages = [];

      // Push the main banner image first
      var bannerSrc = $('.banner-' + id).attr('src');
      if (bannerSrc) currentGalleryImages.push(bannerSrc);

      // Push all supplementary thumbnails/images
      $('.img-' + id).each(function (index, item) {
        var thumbSrc = $(item).attr('data-src');
        if (thumbSrc) currentGalleryImages.push(thumbSrc);
      });

      // Safety check: ensure we actually found images
      if (currentGalleryImages.length === 0) return;

      // Start at the first image (the banner)
      currentGalleryIndex = 0;

      var lightbox = document.getElementById('lightbox');
      var lightboxImg = document.getElementById('lightboxImg');

      if (lightbox && lightboxImg) {
        // FIX: Use the first item from your freshly built array
        lightboxImg.src = currentGalleryImages[currentGalleryIndex];

        lightbox.style.display = 'flex';
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      }
    };

    // 2. Add this companion function to handle Next/Prev clicks
    window.changeLightboxImage = function (direction) {
      var lightboxImg = document.getElementById('lightboxImg');
      if (!lightboxImg || currentGalleryImages.length === 0) return;

      // Calculate next index
      currentGalleryIndex += direction;

      // Infinite loop logic
      if (currentGalleryIndex >= currentGalleryImages.length) {
        currentGalleryIndex = 0; // Loop back to the start
      } else if (currentGalleryIndex < 0) {
        currentGalleryIndex = currentGalleryImages.length - 1; // Loop to the end
      }

      // Update the UI
      lightboxImg.src = currentGalleryImages[currentGalleryIndex];
    };
    window.redirectToProductDetails = function (productId, event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      if (!productId) return;
      window.location.href = "preview.html?id=" + encodeURIComponent(productId);
    };

    $(document).ready(function () {
      // 🔗 Direct relative route path targeting your local folder workspace structure
      const LOCAL_CATEGORIES_SOURCE = "data/categories.json";

      function loadLocalCatalog() {
        $.ajax({
          url: LOCAL_CATEGORIES_SOURCE,
          type: "GET",
          dataType: "json",
          mimeType: "application/json", // Ensures clean system evaluation configuration matrices
          success: function (response) {
            // 1. Verify schema signature integrity
            if (!response || !response.data) {
              console.error("Local catalog dataset payload structure is missing or invalid.");
              return;
            }

            // 2. Map system updates stamp to screen template metrics layout safely
            if (response.last_updated) {
              $("#catalog_sync_stamp").text("Catalog Status Live: " + response.last_updated);
            }

            // 3. Extract items array and apply standard ascending Sort ID format layout routing
            let categoriesArray = response.data;
            categoriesArray.sort(function (a, b) {
              return Number(a.sort_id) - Number(b.sort_id);
            });

            // 4. Clear and populate your clean grid layout container interface
            let gridContainer = $("#categories_grid_container");
            gridContainer.empty();

            categoriesArray.forEach(function (category) {
              // Verify element state flags are set to run actively
              if (category.status !== "Active") return;

              let cardHtml = `
                  <div class="col">
                    <div class="category-card-wrapper" onclick="redirectToCategoryProducts('${category.id}')">
                      <div style="overflow: hidden; line-height: 0;">
                        <img src="${category.image}" class="category-img-frame" alt="${category.name}" />
                      </div>
                      <div class="category-footer-body">
                        <h4 class="category-title-text">${category.name}</h4>
                        <span class="category-status-badge">View Collection ⟶</span>
                      </div>
                    </div>
                  </div>
                `;
              gridContainer.append(cardHtml);
            });
          },
          error: function (xhr, status, error) {
            console.error("Local Asset Engine Load Error: Failed to open relative local JSON data resource.", error);
            $("#categories_grid_container").html(`
                <div class="col-12 text-center py-5">
                  <p class="text-secondary small">Unable to map local files layout. Verify data/category.json paths match up clean.</p>
                </div>
              `);
          }
        });
      }

      // 🚀 Redirect tracking mapping parameter targets directly to query values format on page locations
      window.redirectToCategoryProducts = function (categoryId) {
        if (!categoryId) return;
        window.location.href = "products.html?category_id=" + encodeURIComponent(categoryId);
      };

      // Launch direct rendering pipeline tracking sequence immediately
      loadLocalCatalog();
    });


    $(document).ready(function () {

      // 🔗 Local Products Path Endpoint mapping
      const LOCAL_PRODUCTS_SOURCE = "data/products.json";

      function loadFeaturedDesigns() {
        $.ajax({
          url: LOCAL_PRODUCTS_SOURCE,
          type: "GET",
          dataType: "json",
          mimeType: "application/json",
          success: function (response) {
            if (!response || !response.data) {
              console.error("Products payload data structure invalid.");
              return;
            }

            let allProducts = response.data;

            // 1. Group all products by their Category ID array keys
            let productsByCategory = {};
            allProducts.forEach(function (product) {
              if (product.status === "Active") {
                if (!productsByCategory[product.category_id]) {
                  productsByCategory[product.category_id] = [];
                }
                productsByCategory[product.category_id].push(product);
              }
            });

            // 2. Extract up to 3 latest products from each group matrix channel
            let featuredItems = [];
            Object.keys(productsByCategory).forEach(function (catId) {
              let categoryProducts = productsByCategory[catId];

              // Sort products by date descending (Newest first)
              categoryProducts.sort(function (a, b) {
                return new Date(b.create_date) - new Date(a.create_date);
              });

              // Take the top 3 items
              let latestThree = categoryProducts.slice(0, 3);
              featuredItems = featuredItems.concat(latestThree);
            });

            // 3. Clear container layout and render premium product cards
            let sliderTrack = $('#featured_slider');
            // sliderTrack.empty();

            if (featuredItems.length === 0) {

      // Action mapping wrapper routing straight to product filters

    (function () {
      const container = document.querySelector('.carousel-container');
      if (!container) return;

      const track = container.querySelector('.slider');
      const prevBtn = container.querySelector('.carousel-btn.prev');
      const nextBtn = container.querySelector('.carousel-btn.next');

      let currentIndex = 0;
      let slidesPerView = 1;
      const loop = true;
      const autoplay = true;
      const autoplayInterval = 3600;
      let autoplayTimer = null;

      function calcSlidesPerView() {
        const w = window.innerWidth;
        if (w < 600) return 1;
        if (w < 900) return 3;
        return 4;
      }

      function update() {
        slidesPerView = calcSlidesPerView();
        const items = Array.from(track.children);
        const total = items.length;
        const maxIndex = Math.max(0, total - slidesPerView);
        if (currentIndex > maxIndex) currentIndex = loop ? 0 : maxIndex;
        moveTo(currentIndex);
      }

      function moveTo(index) {
        const children = Array.from(track.children);
        if (children.length <= 1) { track.style.transform = ''; return; }
        let step = 0;
        if (children.length > 1) {
          const r0 = children[0].getBoundingClientRect();
          const r1 = children[1].getBoundingClientRect();
          step = r1.left - r0.left;
        }
        if (!step || !isFinite(step)) {
          const pct = (100 / slidesPerView) * index;
          track.style.transform = `translateX(-${pct}%)`;
        } else {
          track.style.transform = `translateX(-${Math.round(index * step)}px)`;
        }
      }

      function goNext() {
        const items = Array.from(track.children);
        const total = items.length;
        const maxIndex = Math.max(0, total - slidesPerView);
        if (currentIndex >= maxIndex) {
          if (loop) currentIndex = 0;
          else return;
        } else {
          currentIndex++;
        }
        update();
      }

      function goPrev() {
        const items = Array.from(track.children);
        const total = items.length;
        const maxIndex = Math.max(0, total - slidesPerView);
        if (currentIndex <= 0) {
          if (loop) currentIndex = maxIndex;
          else return;
        } else {
          currentIndex--;
        }
        update();
      }

      // Bind click listeners securely
      if (prevBtn) prevBtn.addEventListener('click', function (e) { e.preventDefault(); goPrev(); });
      if (nextBtn) nextBtn.addEventListener('click', function (e) { e.preventDefault(); goNext(); });

      function startAutoplay() {
        if (!autoplay) return;
        stopAutoplay();
        autoplayTimer = setInterval(goNext, autoplayInterval);
      }
      function stopAutoplay() { if (autoplayTimer) { clearInterval(autoplayTimer); autoplayTimer = null; } }

      container.addEventListener('mouseenter', stopAutoplay);
      container.addEventListener('mouseleave', startAutoplay);

      let resizeTimer = null;
      window.addEventListener('resize', function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(update, 120);
      });

      // Run immediately on load
      setTimeout(function () { update(); startAutoplay(); }, 150);
    })();

    // 🚀 Dynamic routing function with explicit click isolation
    window.redirectToProductDetails = function (productId, event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation(); // Prevents the container frame from triggering a lightbox window launch
      }
      if (!productId) return;

      // Redirects directly to your details layout passing down the target identifier
      window.location.href = "preview.html?id=" + encodeURIComponent(productId);
    };

    /**
 * Global function to close the system Lightbox Modal securely
 */
    window.closeLightboxModal = function () {
      var lightbox = document.getElementById('lightbox');

      if (lightbox) {
        lightbox.style.display = 'none';
        lightbox.setAttribute('aria-hidden', 'true');

        // 🚀 Restores standard vertical scrollbars to the window backdrop
        document.body.style.overflow = 'auto';
      }
    };
  </script>
